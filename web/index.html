  <meta name="viewport" content="width=1440" />
  <style>
    * { box-sizing: border-box; }
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body {
      background: #f7f5f0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      color: #1a1a1a; -webkit-font-smoothing: antialiased; overflow: hidden;
    }
    button { font-family: inherit; }
    textarea { font-family: inherit; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ece8df; border-radius: 4px; }
    @keyframes qlspin { to { transform: rotate(360deg) } }
    @keyframes qldot { 0%, 60%, 100% { opacity: 0.3 } 30% { opacity: 1 } }
    @keyframes qlskeleton { 0%, 100% { opacity: 1 } 50% { opacity: 0.55 } }
    @keyframes qlfadein { from { opacity: 0; transform: translateY(4px) } to { opacity: 1; transform: none } }
  </style>
</head>
